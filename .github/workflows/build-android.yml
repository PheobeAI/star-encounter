name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Generate code
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Build APK (Debug)
      run: flutter build apk --debug
      continue-on-error: false

    - name: Build APK (Release)
      run: flutter build apk --release
      continue-on-error: false

    - name: Get APK information
      id: apk_info
      run: |
        $version = flutter --version | Select-String -Pattern "Flutter\s+Dart" | ForEach-Object { $_.Matches.Groups[1].Value }
        $apkSize = (Get-Item build\app\outputs\flutter-apk\app-release.apk).Length / 1MB
        Write-Output "version=$version" >> $GITHUB_OUTPUT
        Write-Output "size_mb=$apkSize" >> $GITHUB_OUTPUT
        Write-Output "apk_path=build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_OUTPUT

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: star-encounter-release
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment PR with APK
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const apkPath = 'build/app/outputs/flutter-apk/app-release.apk';
          if (fs.existsSync(apkPath)) {
            const size = (fs.statSync(apkPath).size / 1024 / 1024).toFixed(2);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **APK 构建成功！**\n\n📦 **文件大小**: ${size} MB\n🔗 **下载链接**: [下载 APK](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
          }

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星之邂逅 - Star Encounter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #ff6b9d, #c56cf0, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0c0;
            font-size: 16px;
        }
        
        .characters {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px 0;
            flex: 1;
        }
        
        .character-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b9d;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }
        
        .character-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .character-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .character-desc {
            font-size: 12px;
            color: #a0a0c0;
            line-height: 1.5;
        }
        
        .personality-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 10px;
            background: rgba(255, 107, 157, 0.3);
            color: #ff6b9d;
        }
        
        .chat-container {
            display: none;
            flex: 1;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.character {
            background: rgba(255, 107, 157, 0.2);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.user {
            background: rgba(124, 58, 237, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .chat-input-container {
            display: flex;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b9d, #c56cf0);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0c0;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b9d;
        }
        
        .stat-label {
            font-size: 12px;
            color: #a0a0c0;
            margin-top: 5px;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 18px;
            color: #a0a0c0;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <header>
            <div class="logo">⭐</div>
            <h1>星之邂逅</h1>
            <p class="subtitle">与二次元角色邂逅浪漫故事</p>
        </header>
        
        <div id="characterList" class="characters">
            <div class="character-card" onclick="selectCharacter('yuki')">
                <div class="character-avatar" style="background: linear-gradient(135deg, #a8edea, #fed6e3);">❄️</div>
                <div class="character-name">雪羽</div>
                <div class="character-desc">来自冰雪王国的公主，性格温柔内向</div>
                <span class="personality-tag">温柔型</span>
            </div>
            
            <div class="character-card" onclick="selectCharacter('rina')">
                <div class="character-avatar" style="background: linear-gradient(135deg, #ffdde1, #ee9ca7);">🌸</div>
                <div class="character-name">莉娜</div>
                <div class="character-desc">活力四射的阳光少女，喜欢有趣的事情</div>
                <span class="personality-tag">活泼型</span>
            </div>
            
            <div class="character-card" onclick="selectCharacter('miku')">
                <div class="character-avatar" style="background: linear-gradient(135deg, #c9ffbf, #a8e063);">🎵</div>
                <div class="character-name">美琴</div>
                <div class="character-desc">神秘的歌手，拥有天籁般的嗓音</div>
                <span class="personality-tag">神秘型</span>
            </div>
            
            <div class="character-card" onclick="selectCharacter('sora')">
                <div class="character-avatar" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb);">🎮</div>
                <div class="character-name">空</div>
                <div class="character-desc">酷酷的电竞少女，实际上是个傲娇</div>
                <span class="personality-tag">傲娇型</span>
            </div>
        </div>
        
        <div id="chatContainer" class="chat-container">
            <div class="chat-header" onclick="showCharacterList()">
                <span style="font-size: 24px; margin-right: 10px;" id="chatAvatar">❄️</span>
                <div>
                    <div style="font-weight: bold;" id="chatName">雪羽</div>
                    <div style="font-size: 12px; color: #a0a0c0;" id="chatStatus">在线</div>
                </div>
                <span style="margin-left: auto;">⬅️</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message character" id="firstMessage">
                    你好呀～很高兴见到你！✨ 
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="messageInput" placeholder="发送消息..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="affection">50</div>
                <div class="stat-label">好感度</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">等级</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="chapters">0</div>
                <div class="stat-label">剧情章节</div>
            </div>
        </div>
    </div>
    
    <script>
        // 角色数据
        const characters = {
            yuki: {
                name: '雪羽',
                avatar: '❄️',
                personality: 'gentle',
                greeting: '你好呀～很高兴见到你！✨'
            },
            rina: {
                name: '莉娜',
                avatar: '🌸',
                personality: 'lively',
                greeting: '哇！终于有人来了！你好呀！🎉'
            },
            miku: {
                name: '美琴',
                avatar: '🎵',
                personality: 'mysterious',
                greeting: '......你好。我是美琴。🎶'
            },
            sora: {
                name: '空',
                avatar: '🎮',
                personality: 'tsundere',
                greeting: '哼...你也是来打游戏的？'
            }
        };
        
        // 对话回复
        const responses = {
            gentle: [
                '嗯嗯，我一直在等你呢～',
                '谢谢你愿意陪我聊天～',
                '今天的星星很美呢，要一起看吗？',
                '我很喜欢和你聊天的感觉～',
                '无论说什么，我都会认真听的～'
            ],
            lively: [
                '太棒了！继续继续！',
                '哈哈哈好好笑！',
                '真的吗？太有趣了！',
                '我最喜欢聊天了！',
                '再来多点再来多点！'
            ],
            mysterious: [
                '......也许这就是命运吧。',
                '有些事情，不知道比较好。',
                '你...想知道我的秘密吗？',
                '时间的答案，终会揭晓。',
                '......（微笑）'
            ],
            tsundere: [
                '才...才不是因为想见你呢！',
                '哼，别误会了！',
                '你这个人...还不赖吧。',
                '哼！这有什么好奇怪的！',
                '......好吧，只允许你陪我。'
            ]
        };
        
        let currentCharacter = null;
        let affection = 50;
        let level = 1;
        let chapters = 0;
        
        // 创建星星背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // 选择角色
        function selectCharacter(characterId) {
            currentCharacter = characters[characterId];
            document.getElementById('characterList').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = currentCharacter.avatar;
            document.getElementById('chatName').textContent = currentCharacter.name;
            
            // 显示初始对话
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            addMessage(currentCharacter.greeting, 'character');
        }
        
        // 显示角色列表
        function showCharacterList() {
            currentCharacter = null;
            document.getElementById('characterList').style.display = 'grid';
            document.getElementById('chatContainer').style.display = 'none';
        }
        
        // 添加消息
        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentCharacter) return;
            
            addMessage(text, 'user');
            input.value = '';
            
            // 模拟回复延迟
            setTimeout(() => {
                const personalityResponses = responses[currentCharacter.personality];
                const reply = personalityResponses[Math.floor(Math.random() * personalityResponses.length)];
                addMessage(reply, 'character');
                
                // 增加好感度
                affection = Math.min(100, affection + Math.floor(Math.random() * 3));
                document.getElementById('affection').textContent = affection;
                
                // 随机升级
                if (affection >= level * 20) {
                    level++;
                    document.getElementById('level').textContent = level;
                }
            }, 500 + Math.random() * 1000);
        }
        
        // 键盘发送
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 初始化
        createStars();
    </script>
</body>
</html>

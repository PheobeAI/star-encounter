name: star_encounter
description: 二次元角色互动与养成APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.0.5

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 网络请求
  dio: ^5.3.2

  # JSON序列化
  json_annotation: ^4.8.1

  # UI组件
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # 工具库
  intl: ^0.18.1
  path_provider: ^2.1.1

  # 日期时间
  timeago: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  # JSON序列化
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

  # 测试
  mockito: ^5.4.4
  flutter_test_plus: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

name: star_encounter
description: 星之邂逅 - 二次元角色互动与养成APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # WebView
  webview_flutter: ^4.4.2

  # UI组件
  cupertino_icons: ^1.0.6

  # 日志
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  # 代码生成
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  
  # 图标生成
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
